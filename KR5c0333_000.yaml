body:
  text: 種芝草法黃帝問曰敢問石室之文種芝法可得聞乎曰種芝第七經內有老子曰咨爾非人皆知生之為樂死之為惡而莫知其所以自生也千術萬藥入兆身止可得老壽千年已還數百年已上終不能使飛行登仙上朝天皇也木藥之善者松脂也此木生蒞苓有脂肥故也其垂實可服長草之善者榮華黃精天門冬山薊也止冝日每服不得一日有廢也可得百日還元其不能與天地相畢後世方士增加其説以誤學者吾深閔之八石九丹雲母玉漿服之當斷房室血食不能使兆輕舉飛行乘雲也聞仙人服紫英不耶豈空言也夫名山之隂陽精泉水之上木石之下亦生芝曰其所稟皆山水木土之精丹碎之上黃金之上曽青之上雄黃之上皆生芝此芝非至德感神者逢而不見見而不得食也此芝之所以能使人立仙者受此四物之至精含天地隂陽之和氣藥薰蒸之津液以符生成其味乃神於此四物之本體也今但取此四物搗治服之為最薄者切之以感應會內之於爐釡之中其精上飛掃而服之則百部於草藥不徒於服也要得天地之淳氣不接引此四物之精液而令其上更成生物不亦當復百部於其上著上釡者即余將去矣顧念兆兆將成灰土衰哉今撰天文芝其有骨命者當得吾此文其先人有罪其身不得應長生亦不得吾書藏之名山石函九重之下無妄傳慎之慎之當以立春之日掘冡東寅地宅內外無有也要欲得善土非灰壤者掘為坑深三尺方三尺以曽青一斤治為屑褁以羊負來沃以青箱子一升復以土築其上七日當有青雲也百日上生芝其狀如苗以寅卯之日從其下以青繒三尺執骨刀禹步而頰取之愼無以顧歸乾百日治以屑服一刀圭以井花水日服三芝晝則能輕舉當有神來迎之百日升天法與天地無窮矣當以立夏之日於南山之陽掘地為坑深八尺方八尺以丹砂二斤治為屑褁以雄黃赤色者碎碾去其頰石以丹屑納其中沃以玄參二升覆土於上築其平二八日當有赤雲覆之八十日上生赤氣如煙與赤相接百日上生赤芝如苗狀以已午之日從日下禹步以絳繒八尺以木刀採之再拜而去勿復顧也還隂乾百日治方寸七日一服皆以清旦日始出未一尺時以井花水送下晝時三尸九蟲七疾野肺瘕積聚百病皆化為濁血從鼻口中出以井花水洗之即能步行水上焰火不灼絶飮不食去世矣勿令入房屋絶血食即有龍車衆仙來迎之欲止民間慎勿種此芝當以立秋之日於西山之隂掘地為坑深六尺方六尺以黃金一斤火洋之投於坑中灌以虛山鶴膝草一斤凊酒一斛浮萍一斛覆其上土築之六日有白雲來覆之六十日上生黃氣如蒸上連白雲百日上生黃芝如苗狀以申酉日申酉時欲取日下以白素六尺禹步以金刀採之再拜而去無復顧還隂乾百日治服三指撮芝盡老者更少少者華色生頭白者皆黑齒落復生奮乎踰地即能飛入天中任意取之亦當有神仙玉女侍從問以去止投之事也當以季冬之日於北山之隂掘地為坑深五尺埋雄黃三斤治之以熟銅器盛之灌以麻油二斤覆以雄黃粉一斤覆上築之五日上有黑雲來覆其上五十日上生紫氣興黑氣相連百日上生紫芝如苗狀其夜則光照一里之內天隂見毫光也以壬癸日從日下以角刀丙辛日以黑繒五尺採之再拜而去勿復顧也隂乾百日以子亥日治末服之五分七日以夜半子時北向服之也芝盡則老化為童子女人亦可服此芝者司命太乙遣仙官迎之壽與天地同緣刻不入火燒不灼水溺不濕五毒逺之不知飢渴服此四芝皆長生不死期所在致天官行厨亦可不食藏所在山澤供給龍虎之乘鬼神來拜受使祕之論者曰以此言之天地隂陽之數能變生萬物不可云無譬如陽燧取火隂燧取水內藏竹生火何謂之不感乎其有丹砂之釜亦成水銀感動之精何物不可化何物不可成假託物類變化而生藏之金匱慎勿泄漏有骨命者乃逢汝形勤加權喜司命除其死籍天地俱并遊於九天之上展轉六合之中神通洞逹祚享無窮穜芝草法終
